<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/aisi-mark.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      />
    </noscript>
    <title>艾斯</title>
    <style>
      #root-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0f0f0f;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
        z-index: 99999;
        transition: opacity 0.2s ease;
      }
      #root-splash .splash-spinner {
        width: 24px;
        height: 24px;
        border: 2px solid #333333;
        border-top-color: #ffffff;
        border-radius: 50%;
        animation: splash-spin 1s linear infinite;
        margin-bottom: 20px;
      }
      #root-splash .splash-logo {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.5px;
        margin-bottom: 12px;
      }
      #root-splash .splash-status {
        font-size: 13px;
        color: #888888;
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="root-splash">
        <div class="splash-spinner"></div>
        <div class="splash-logo">AIASys</div>
        <div class="splash-status">正在加载...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
