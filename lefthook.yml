# Lefthook pre-commit hooks configuration
# https://github.com/evilmartians/lefthook
#
# 安装：cd apps/web && npx lefthook install
# 手动运行：cd apps/web && npx lefthook run pre-commit
#
# 注意：{staged_files} 返回的是相对于仓库根目录的路径（如 apps/backend/app/foo.py），
# 而后端命令需要在 apps/backend/ 下运行，所以需要去掉 "apps/backend/" 前缀。

pre-commit:
  parallel: true
  commands:
    # --- Frontend ---
    frontend-lint:
      glob: "apps/web/src/**/*.{ts,tsx,js,jsx}"
      run: cd apps/web && files=$(echo "{staged_files}" | sed 's|apps/web/||g') && existing="" && for f in $files; do [ -f "$f" ] && existing="$existing $f"; done && [ -n "$existing" ] && npx eslint $existing || true

    frontend-type-check:
      glob: "apps/web/src/**/*.{ts,tsx}"
      run: cd apps/web && npx tsc --noEmit

    # --- Backend ---
    # 用 shell 参数替换去掉 apps/backend/ 前缀，因为命令在 apps/backend/ 下执行
    backend-ruff:
      glob: "apps/backend/app/**/*.py"
      run: cd apps/backend && files=$(echo "{staged_files}" | sed 's|apps/backend/||g') && [ -n "$files" ] && uv run ruff check $files && uv run ruff format --check $files || true

    # --- Commit Author ---
    author-check:
      glob: "*"
      run: |
        name=$(git config user.name)
        email=$(git config user.email)
        if echo "$name" | grep -qiE '\b(ai|assistant|bot|copilot|agent)\b'; then
          echo ""
          echo "  ❌ Commit author 被拦截"
          echo "  author name: '$name'"
          echo "  包含禁止的占位词（ai / assistant / bot / copilot / agent）"
          echo ""
          echo "  请设置真实的身份后重新提交："
          echo "    git config user.name \"Your Name\""
          echo "    git config user.email \"your.email@example.com\""
          echo ""
          exit 1
        fi
        if echo "$email" | grep -qiE '(aiasys\.local|example\.com|test\.com|no-?reply|bot@|ai@|assistant@)'; then
          echo ""
          echo "  ❌ Commit author 被拦截"
          echo "  author email: '$email'"
          echo "  看起来像是占位地址"
          echo ""
          echo "  请设置真实的邮箱后重新提交："
          echo "    git config user.email \"your.email@example.com\""
          echo ""
          exit 1
        fi
        echo "  ✓ author check passed: $name <$email>"

    # --- EditorConfig ---
    editorconfig:
      glob: "*"
      run: node scripts/dev/lefthook/editorconfig-checker.mjs {staged_files}