name: Desktop Build & Pre-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options: [beta, stable]
        default: beta

permissions:
  contents: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web dist
        run: npm run build

      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/
          retention-days: 1

  build-desktop:
    needs: build-web
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            script: dist:ci:linux
            artifact-name: desktop-linux
            artifact-path: apps/desktop/dist/*.AppImage
          - os: macos-latest
            target: mac
            script: dist:ci:mac
            artifact-name: desktop-mac
            artifact-path: apps/desktop/dist/*.dmg
            artifact-path2: apps/desktop/dist/*.zip
          - os: windows-latest
            target: win
            script: dist:ci:win
            artifact-name: desktop-win
            artifact-path: apps/desktop/dist/*.exe
            artifact-path2: apps/desktop/dist/*.zip
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install desktop deps
        run: cd apps/desktop && npm ci

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "apps/backend/uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "apps/backend/.python-version"

      - name: Install backend deps
        run: cd apps/backend && uv sync --frozen

      - name: Prepare runtime
        run: cd apps/desktop && npm run prepare:runtime

      - name: Build desktop (${{ matrix.target }})
        run: cd apps/desktop && npm run ${{ matrix.script }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          retention-days: 1
          path: |
            ${{ matrix.artifact-path }}
            ${{ matrix.artifact-path2 }}

  publish-beta:
    needs: build-desktop
    if: always()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-linux
          path: release-artifacts/linux/
        continue-on-error: true

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-mac
          path: release-artifacts/mac/
        continue-on-error: true

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: desktop-win
          path: release-artifacts/win/
        continue-on-error: true

      - name: Generate version tag
        id: version
        run: |
          VERSION=$(node -p "require('./apps/desktop/package.json').version")
          # 查询该版本已有的 beta tag 数量，自动递增序号
          EXISTING=$(gh release list --limit 100 --json tagName --jq ".[].tagName" 2>/dev/null | grep "^v${VERSION}-beta\." | wc -l)
          N=$((EXISTING + 1))
          TAG="v${VERSION}-beta.${N}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Beta number: ${N}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create GitHub Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Beta ${{ steps.version.outputs.tag }}"
          prerelease: true
          generate_release_notes: true
          files: |
            release-artifacts/linux/*.AppImage
            release-artifacts/mac/*.dmg
            release-artifacts/mac/*.zip
            release-artifacts/win/*.exe
            release-artifacts/win/*.zip