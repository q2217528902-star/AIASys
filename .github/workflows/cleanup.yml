name: Cleanup Old Runs

on:
  schedule:
    # 每天凌晨 3 点 (UTC) 清理
    - cron: '0 3 * * *'
  workflow_dispatch: {}

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete workflow runs older than 7 days
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 7
          keep_minimum_runs: 3