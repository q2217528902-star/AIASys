name: Secret Scan

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan git history for secrets
        shell: bash
        run: |
          # CI 模式下只跑轻量扫描，避免超时
          bash scripts/security/scan-secrets-ci.sh
