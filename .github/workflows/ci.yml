name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
  workflow_dispatch: {}

jobs:
  web-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "apps/backend/uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff format check
        run: uv run ruff format --check app/

      - name: Pylint check
        run: uv run pylint --disable=R,C --exit-zero app/

      - name: Type check (mypy)
        run: uv run mypy app/ || true

      - name: Run tests
        run: uv run pytest -v -x --ignore=tests/test_auto_tasks_routes.py --ignore=tests/test_compaction.py --ignore=tests/test_folder_import_routes.py --ignore=tests/test_font_helper.py --ignore=tests/test_global_workspace_file_routes.py --ignore=tests/test_runtime_execution.py --ignore=tests/test_session_execution_journal.py --ignore=tests/test_session_runtime_state.py --ignore=tests/test_sqlite_kb_service.py

  desktop-check:
    needs: [web-check, backend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Build web dist (in-job)
        run: cd apps/web && npm ci && npm run build

      - name: Setup Node.js for desktop
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install desktop deps
        run: cd apps/desktop && npm ci

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "apps/backend/uv.lock"

      - name: Install Python & backend deps
        run: |
          cd apps/backend
          uv python install 3.12
          uv sync --frozen

      - name: Prepare runtime
        run: cd apps/desktop && npm run prepare:runtime

      - name: Build desktop (Linux dir)
        run: cd apps/desktop && npm run dist:ci:linux
