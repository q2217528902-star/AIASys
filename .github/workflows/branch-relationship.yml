name: Branch Relationship

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ensure-main-not-ahead-of-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check main has no independent commits
        run: |
          git fetch origin main dev

          # 检查 main 上是否有 dev 没有的非 merge commit
          # merge commit 是正常的（dev merge 到 main 时产生）
          # 非 merge commit 表示有人在 main 上直接提交或从其他分支合并
          independent=$(git log origin/dev..origin/main --no-merges --oneline)

          if [ -z "$independent" ]; then
            echo "✅ main has no independent commits"
          else
            echo "❌ ERROR: main has commits that are not from dev merge:"
            echo "$independent"
            echo ""
            echo "All commits on main must come from merging dev."
            echo "Do not push directly to main or merge from other branches."
            exit 1
          fi
